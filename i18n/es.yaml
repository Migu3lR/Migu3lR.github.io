## Homepage about
- id: "about_title"
  translation: "¿Quién soy?"

- id: "about_content"
  translation: "<p class='lead'>Ingeniero de corazón, arquitecto por pasión y líder por práctica. Diseño soluciones cloud que conectan la ambición del negocio con la realidad técnica — y desarrollo a las personas que las construyen.</p><p>En AWS, he expandido ese liderazgo más allá de las fronteras — mentoreando Arquitectos de Soluciones e ingenieros de partners, guiando la estrategia técnica de más de 200 clientes en gobierno, salud, fintech y logística, y coordinando equipos multifuncionales para lograr resultados que ninguna persona podría alcanzar sola.</p>"

