baseURL = "https://migu3lr.github.io/"
title = "Miguel Romero"
languageCode = "en"

[pagination]
pagerSize = 3


# Exclude footer section from generating list pages (index.html and index.xml)
[outputs]
  page = ["HTML"]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
  footer = []

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"
  topic = "topics"

# Explicitly prevent the footer section from generating any output
[outputFormats.footerSection]
  # Empty configuration to prevent any output

# Specifically disable generation of these kinds for the footer content
disableKinds = ["footerSection"]

[module]
[[module.imports]]
path = "github.com/zetxek/adritian-free-hugo-theme"

## Base mounts - so your site's assets are available
[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

# The following mounts are required for the theme to be able to load bootstrap
# Remember also to copy the theme's `package.json` to your site, and run `npm install`
[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"

[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"


[params]
title = 'Miguel Romero - Solutions Architect'
description = 'Senior Solutions Architect at AWS specializing in cloud transformation, generative AI, and data engineering.'
images = ['/img/og-img.png']
themeColor = '#478079'

[params.seo]
siteName = 'Miguel Romero'
siteDescription = 'Senior Solutions Architect at AWS specializing in cloud transformation, generative AI, and data engineering.'
siteImage = '/img/og-img.png'

[params.social]
twitter = ''

[params.seo.person]
name = 'Miguel Romero Geraldino'
url = 'https://migu3lr.github.io'
sameAs = ['https://www.linkedin.com/in/miguelromerog/']
sections = [
  "showcase",
  "about",
  "education",
  "experience",
  "client-and-work",
  "testimonial",
  "contact",
  "newsletter",
]
# If you want to display an image logo in the header, you can add it here
# logo = '/img/hugo.svg'

homepageExperienceCount = 6

[params.favicons]
# Optional: provide a different source image for auto-generation
source = "icons/favicon.png"

# Optional: override any generated file with a static one
# favicon = "/favicon.ico"
# icon16 = "/icons/icon-16.png"
# icon32 = "/icons/icon-32.png"
# appleTouch = "/icons/apple-touch-icon.png"
# icon192 = "/icons/icon-192.png"
# icon512 = "/icons/icon-512.png"
# manifest = "/site.webmanifest"

[params.analytics]
## Analytics parameters.
### Supported so far: Vercel (Page Insights, Analytics)
### And Google (Tag Manager, Analytics)

# controls vercel page insights - disabled by default
# to enable, just set to true
vercelPageInsights = false
vercelAnalytics = false

# google analytics and tag manager. to enable, set "enabled" to true
# and add the tracking code (UA-something for analytics, GTM-something for tag manager)
[params.analytics.googleAnalytics]
code = "G-X0GTL69PKT"
enabled = true
[params.analytics.googleTagManager]
code = "GTM-XXXXX"
enabled = false

[caches]
  [caches.getresource]
    maxAge = "0s"
    dir = ":resourceDir/_gen"

[build]
writeStats = true

[build.buildStats]
enabledFor = ["scss"]
disableClasses = false
disableIDs = false
disableTags = false
enable = true

# Language selector visibility — set to true to hide in that location
[params.languages.selector.disable]
footer = false
header = false
mobileHeader = false

