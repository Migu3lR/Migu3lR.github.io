{{ $section := .Section }}
{{ $config := .Config }}
{{ $title := default (humanize $section) $config.title }}
{{ $data := .Data }}

<section id="{{ $section }}" class="section-block">
  <div class="section-heading">
    <span class="bar"></span>
    <div><h2>{{ $title }}</h2></div>
  </div>
  <div class="expandable-grid">
    {{ if $data }}
      {{ range $data }}
        <article class="expandable-card certification-card">
          <div class="card-content">
            <p class="card-meta">{{ .year }}{{ with .issuer }} · {{ . }}{{ end }}</p>
            <h3>{{ .name }}</h3>
          </div>
        </article>
      {{ end }}
    {{ end }}
  </div>
</section>
