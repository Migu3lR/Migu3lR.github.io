{{ $section := .Section }}
{{ $config := .Config }}
{{ $title := default (humanize $section) $config.title }}
{{ $data := .Data }}

<section id="{{ $section }}" class="section-block">
  <div class="section-heading">
    <span class="bar"></span>
    <div><h2>{{ $title }}</h2></div>
  </div>
  <div class="skills-grid">
    {{ if $data }}
      {{ range $data }}
        <div class="skill-category">
          <h3 class="skill-category-name">{{ .language }}</h3>
          <div class="tag-row">
            <span class="tag">{{ .level }}</span>
          </div>
        </div>
      {{ end }}
    {{ end }}
  </div>
</section>
